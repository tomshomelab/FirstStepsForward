services:
  app:
    image: ghcr.io/tomshomelab/firststepsforward:latest
    container_name: firststepsforward
    restart: unless-stopped
    ports:
      - "8094:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:80/ || exit 1"]
      start_period: 5s
      interval: 30s
      timeout: 5s
      retries: 3
