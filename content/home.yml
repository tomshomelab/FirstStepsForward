pricing:
  heading: "Costs"
  intro: >-
    At the initial meeting, counselling, mentoring and coaching costs
    will be agreed and a counselling contract signed.
  entries:
    - title: "Private counselling, coaching, mentoring"
      price: "£60"
      unit: "per 50-minute session"
      note: >-
        Concessions are available for certain benefits as well as for
        blue-light services, public services, armed forces, veterans,
        and NHS — at the discretion of the counsellor on an individual
        basis. Please don't be offended if proof is requested. If
        you're not sure, feel free to ask rather than go without if
        you need support.
    - title: "Trainee counsellor & counsellor supervision"
      price: "£75"
      unit: "per 90 minutes"
      note: ""
    - title: "Corporate training & presentations"
      price: "£400"
      unit: "per 2 hours"
      note: >-
        £150 per subsequent hour. Travel costs to be included
        depending on location.
    - title: "Education & INSET training"
      price: "£400"
      unit: "per 2 hours"
      note: >-
        Half or full days negotiable. Travel costs to be included
        depending on location.
    - title: "Funded coaching sessions (schools, colleges, social services)"
      price: "£80"
      unit: "per 50 minutes"
      note: "Hourly rates available. Travel time and mileage to be included."

